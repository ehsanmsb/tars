apiVersion: apps/v1
kind: Deployment
metadata:
  name: tars
  namespace: tars
  labels:
    app.kubernetes.io/name: tars
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: tars
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tars
    spec:
      serviceAccountName: tars
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tars
          image: tars:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICE_NAME
              value: "nginx"
            - name: CHECK_INTERVAL
              value: "300"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 96Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
