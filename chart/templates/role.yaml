apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "tars.fullname" . }}
  labels:
    {{- include "tars.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["list"]
